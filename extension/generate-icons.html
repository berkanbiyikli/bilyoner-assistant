<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<h2>Bilyoner Extension Icon Generator</h2>
<p>Aşağıdaki butonlara tıklayarak ikonları indirin ve <code>extension/icons/</code> klasörüne kaydedin.</p>
<canvas id="c16" width="16" height="16" style="border:1px solid #ccc"></canvas>
<canvas id="c48" width="48" height="48" style="border:1px solid #ccc"></canvas>
<canvas id="c128" width="128" height="128" style="border:1px solid #ccc"></canvas>
<br><br>
<button onclick="download(16)">icon16.png indir</button>
<button onclick="download(48)">icon48.png indir</button>
<button onclick="download(128)">icon128.png indir</button>

<script>
function drawIcon(size) {
  const canvas = document.getElementById('c' + size);
  const ctx = canvas.getContext('2d');
  
  // Background gradient
  const gradient = ctx.createLinearGradient(0, 0, size, size);
  gradient.addColorStop(0, '#7c3aed');
  gradient.addColorStop(1, '#a855f7');
  
  // Rounded rect
  const r = size * 0.2;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = gradient;
  ctx.fill();
  
  // Text "BA"
  ctx.fillStyle = 'white';
  ctx.font = `bold ${size * 0.38}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('BA', size / 2, size / 2);
}

[16, 48, 128].forEach(s => drawIcon(s));

function download(size) {
  const canvas = document.getElementById('c' + size);
  const link = document.createElement('a');
  link.download = 'icon' + size + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
